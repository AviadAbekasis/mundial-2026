name: Update WC2026 Dashboard

on:
  push:
    branches: [main]
  schedule:
    # GitHub runs scheduled jobs best-effort and drops top-of-hour ones under load, so
    # we use an off-peak minute (:23) and several morning attempts (Israel = UTC+3).
    - cron: '23 5 * * *'    # 08:23 IL — morning refresh
    - cron: '23 6 * * *'    # 09:23 IL — backup if the first was dropped
    - cron: '23 7 * * *'    # 10:23 IL — backup
    - cron: '23 */3 * * *'  # every 3h through the day, off-peak minute
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch, simulate, generate analyses, build dashboard
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python src/run.py 50000 --force

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: output

      - id: deploy
        uses: actions/deploy-pages@v4
